<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro SmartCampus - UTA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<form id="formRegistro">
    <h2>Registro de Usuario <span>(UTA)</span></h2>
    <p class="subtitle">Crea tu cuenta institucional</p>

    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="email" placeholder="Correo institucional" required>
    <input type="password" id="password" placeholder="Contrase&ntilde;a" required>

    <button type="submit" class="btn" id="btnRegistrar">Registrar en BD</button>

    <p id="mensajeEstado" class="message" hidden></p>

    <p class="footer-text">&iquest;Ya tienes cuenta? <a href="index.html">Inicia sesi&oacute;n</a></p>
</form>

<script type="module">
    import { registrarUsuario } from '../Persistence/supabaseClient.js';

    const form = document.getElementById('formRegistro');
    const btn = document.getElementById('btnRegistrar');
    const msg = document.getElementById('mensajeEstado');

    function mostrarMensaje(texto, esError) {
        msg.textContent = texto;
        msg.className = esError ? 'message message-error' : 'message message-success';
        msg.hidden = false;
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        btn.textContent = 'Registrando...';
        btn.disabled = true;
        msg.hidden = true;

        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await registrarUsuario(nombre, email, password);
            mostrarMensaje('Cuenta creada. Redirigiendo...', false);

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        } catch (error) {
            mostrarMensaje(error.message, true);
            btn.textContent = 'Registrar en BD';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
