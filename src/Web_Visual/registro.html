<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro SmartCampus - UTA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<form id="formRegistro">
    <h2>Registro de Usuario <span>(UTA)</span></h2>
    <p class="subtitle">Crea tu cuenta institucional</p>

    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="email" placeholder="Correo institucional" required>
    <input type="password" id="password" placeholder="Contraseña" required>

    <button type="submit" class="btn" id="btnRegistrar">Registrar en BD</button>

    <p id="mensajeEstado" style="font-size:14px; margin-top:10px; display:none;"></p>

    <p class="footer-text">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
</form>

<script type="module">
    import { registrarUsuario } from '../Persistence/supabaseClient.js';

    const form = document.getElementById('formRegistro');
    const btn = document.getElementById('btnRegistrar');
    const msg = document.getElementById('mensajeEstado');

    function mostrarMensaje(texto, esError) {
        msg.textContent = texto;
        msg.style.color = esError ? '#D32F2F' : '#2E7D32';
        msg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.textContent = 'Registrando...';
        btn.disabled = true;

        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await registrarUsuario(nombre, email, password);
            mostrarMensaje('¡Cuenta creada! Redirigiendo...', false);
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        } catch (error) {
            mostrarMensaje(error.message, true);
            btn.textContent = 'Registrar en BD';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
