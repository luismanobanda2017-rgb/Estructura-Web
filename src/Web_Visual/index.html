<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SmartCampus - UTA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<form id="formLogin">
    <h2>SmartCampus<span>UTA</span></h2>
    <p class="subtitle">Gestión Académica Universitaria</p>

    <input type="email" id="email" placeholder="Correo Institucional" required>
    <input type="password" id="password" placeholder="Contraseña" required>

    <button type="submit" class="btn" id="btnLogin">Ingresar</button>

    <p id="mensajeError" style="color:#D32F2F; font-size:14px; margin-top:10px; display:none;"></p>

    <p class="footer-text">¿Nuevo en SmartCampus? <a href="registro.html">Crea una cuenta</a></p>
</form>

<script type="module">
    import { supabase } from '../Persistence/supabaseClient.js';

    const form     = document.getElementById('formLogin');
    const btnLogin = document.getElementById('btnLogin');
    const msgError = document.getElementById('mensajeError');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnLogin.textContent = 'Ingresando...';
        btnLogin.disabled = true;
        msgError.style.display = 'none';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const hash     = btoa(password + '_uta_salt');

        const { data, error } = await supabase
            .from('usuarios')
            .select('*')
            .eq('email', email)
            .eq('password_hash', hash)
            .single();

        if (error || !data) {
            msgError.textContent = 'Correo o contraseña incorrectos.';
            msgError.style.display = 'block';
            btnLogin.textContent = 'Ingresar';
            btnLogin.disabled = false;
            return;
        }

        // Guardar sesión y redirigir
        localStorage.setItem('smartcampus_usuario', JSON.stringify(data));
        window.location.href = 'dashboard.html';
    });

    // Si ya hay sesión activa, ir directo al dashboard
    if (localStorage.getItem('smartcampus_usuario')) {
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
