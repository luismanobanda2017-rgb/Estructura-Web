<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampus UTA - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2>Bienvenido, <span id="nombreUsuario">...</span></h2>
        <p id="rolUsuario" class="subtitle"></p>
    </header>

    <div class="grid-modules">
        <div class="card">
            <h3>Atención (Colas)</h3>
            <p>Gestión de turnos FIFO para atención estudiantil.</p>
            <button class="btn-small">Ver Turnos</button>
        </div>

        <div class="card">
            <h3>Documentos (Árboles)</h3>
            <p>Organización jerárquica de archivos académicos.</p>
            <button class="btn-small">Explorar</button>
        </div>

        <div class="card">
            <h3>Rutas (Grafos)</h3>
            <p>Cálculo de rutas óptimas dentro del campus.</p>
            <button class="btn-small">Ver Mapa</button>
        </div>

        <div class="card">
            <h3>Trámites (Listas)</h3>
            <p>Historial dinámico de solicitudes ingresadas.</p>
            <button class="btn-small">Mi Historial</button>
        </div>
    </div>

    <footer>
        <p class="footer-text"><a href="#" id="btnLogout">Cerrar Sesión</a></p>
    </footer>
</div>

<script>
    const raw = localStorage.getItem('smartcampus_usuario');

    if (!raw) {
        window.location.href = 'index.html';
    } else {
        const usuario = JSON.parse(raw);
        document.getElementById('nombreUsuario').textContent = usuario.nombre;
        document.getElementById('rolUsuario').textContent = 'Rol: ' + usuario.rol;
    }

    document.getElementById('btnLogout').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('smartcampus_usuario');
        window.location.href = 'index.html';
    });
</script>

</body>
</html>
