<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampus UTA - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2>Bienvenido, <span id="nombreUsuario">...</span></h2>
        <p id="rolUsuario" class="subtitle"></p>
    </header>

    <div class="grid-modules">
        <div class="card">
            <h3>Atenci&oacute;n (Colas)</h3>
            <p>Gesti&oacute;n de turnos FIFO para atenci&oacute;n estudiantil.</p>
            <button class="btn-small">Ver Turnos</button>
        </div>

        <div class="card">
            <h3>Documentos (&Aacute;rboles)</h3>
            <p>Organizaci&oacute;n jer&aacute;rquica de archivos acad&eacute;micos.</p>
            <button class="btn-small">Explorar</button>
        </div>

        <div class="card">
            <h3>Rutas (Grafos)</h3>
            <p>C&aacute;lculo de rutas &oacute;ptimas dentro del campus.</p>
            <button class="btn-small">Ver Mapa</button>
        </div>

        <div class="card">
            <h3>Tr&aacute;mites (Listas)</h3>
            <p>Historial din&aacute;mico de solicitudes ingresadas.</p>
            <button class="btn-small">Mi Historial</button>
        </div>
    </div>

    <footer>
        <p class="footer-text"><a href="#" id="btnLogout">Cerrar sesi&oacute;n</a></p>
    </footer>
</div>

<script type="module">
    import { cerrarSesion, obtenerUsuarioActual } from '../Persistence/supabaseClient.js';

    const usuario = obtenerUsuarioActual();

    if (!usuario) {
        window.location.href = 'index.html';
    } else {
        document.getElementById('nombreUsuario').textContent = usuario.nombre;
        document.getElementById('rolUsuario').textContent = 'Rol: ' + usuario.rol;
    }

    document.getElementById('btnLogout').addEventListener('click', (event) => {
        event.preventDefault();
        cerrarSesion();
    });
</script>

</body>
</html>
